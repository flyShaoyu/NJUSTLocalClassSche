<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>首页</title>
  <style>
    :root {
      --sky: #72a8df;
      --sky-deep: #5d95d4;
      --paper: #f5f7fb;
      --card: rgba(255, 255, 255, 0.97);
      --line: rgba(146, 165, 190, 0.24);
      --ink: #75808e;
      --muted: #adb6c3;
      --accent: #d79761;
      --font-cn: "STKaiti", "KaiTi", "Noto Serif SC", serif;
      --font-ui: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(180deg, #86b7eb 0, var(--sky) 176px, var(--paper) 176px, var(--paper) 100%);
      color: var(--ink);
      font-family: var(--font-ui);
    }

    a,
    button {
      font: inherit;
      color: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .content {
      padding: calc(10px + env(safe-area-inset-top)) 0 16px;
    }

    .feature,
    .menu-wrap,
    .section {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(187, 200, 217, 0.3);
      box-shadow: 0 10px 24px rgba(96, 115, 145, 0.08);
      overflow: hidden;
      margin: 0 0 8px;
    }

    .feature {
      position: relative;
      min-height: 206px;
      margin-left: 0;
      margin-right: 0;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(19, 36, 28, 0.08), rgba(14, 24, 20, 0.42)),
        linear-gradient(135deg, #536d35 0%, #283422 26%, #6e7f4e 42%, #c7c89c 54%, #bfd5df 64%, #788366 76%, #2e3927 100%);
    }

    .feature-shell {
      padding: 0;
      background: #fff;
    }

    .feature.empty::before {
      content: "图片文件夹为空";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.78);
      font-family: var(--font-cn);
      font-size: 24px;
      letter-spacing: 2px;
    }

    .feature img {
      width: 100%;
      height: 206px;
      object-fit: cover;
      display: block;
    }

    .feature-caption {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.36);
      font-family: var(--font-cn);
      font-size: 20px;
    }

    .panel-shell {
      padding: 0 10px;
    }

    .menu-wrap {
      padding: 8px 8px 10px;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px 2px;
    }

    .menu-item {
      border: 0;
      background: none;
      padding: 0 2px;
      text-decoration: none;
      display: grid;
      justify-items: center;
      gap: 3px;
      color: #9ca6b5;
    }

    .menu-item.disabled {
      opacity: 0.92;
    }

    .menu-icon {
      position: relative;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
    }

    .menu-icon::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 72% 26%, rgba(165, 211, 255, 0.55), transparent 28%),
        radial-gradient(circle at 40% 74%, rgba(189, 222, 255, 0.45), transparent 24%);
    }

    .menu-item svg {
      width: 50px;
      height: 50px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      position: relative;
      z-index: 1;
    }

    .menu-item.disabled .menu-icon::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 2px;
      border-radius: 99px;
      background: rgba(211, 147, 108, 0.92);
      transform: rotate(-35deg);
      z-index: 2;
    }

    .menu-label {
      min-height: 28px;
      text-align: center;
      font-family: var(--font-cn);
      font-size: 11px;
      line-height: 1.2;
      color: #77818f;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding-top: 4px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c5c9d2;
    }

    .dot.active {
      background: #69acec;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      color: var(--accent);
      font-family: var(--font-cn);
      font-size: 16px;
    }

    .recent {
      padding: 0 14px;
    }

    .recent-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed rgba(176, 188, 204, 0.4);
    }

    .recent-item:last-child {
      border-bottom: 0;
    }

    .badge {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eef8de, #e0f1dc);
      color: #7f8979;
      font-family: var(--font-cn);
      font-size: 15px;
      border: 1px solid rgba(177, 209, 164, 0.42);
      box-shadow: 0 3px 8px rgba(120, 136, 108, 0.12);
    }

    .recent-main {
      min-width: 0;
    }

    .recent-title {
      font-family: var(--font-cn);
      font-size: 16px;
      color: #59626f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-meta {
      margin-top: 4px;
      color: #b6bcc5;
      font-size: 11px;
    }

    .recent-room {
      font-family: var(--font-cn);
      font-size: 16px;
      color: #8f959c;
      white-space: nowrap;
    }

    .cta {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 14px 16px 16px;
      color: #7b8795;
      font-family: var(--font-cn);
      font-size: 16px;
      border-top: 1px solid var(--line);
      background:
        radial-gradient(circle at 85% 20%, rgba(187, 226, 255, 0.55), transparent 28%),
        linear-gradient(180deg, rgba(247, 250, 255, 0.96), rgba(234, 244, 255, 0.96));
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translate(-50%, 20px);
      max-width: calc(100vw - 32px);
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(70, 86, 107, 0.92);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 721px) {
      .app {
        max-width: 640px;
        margin: 0 auto;
      }
    }

    @media (max-width: 420px) {
      .menu-icon {
        width: 52px;
        height: 52px;
      }

      .menu-item svg {
        width: 46px;
        height: 46px;
      }

      .recent-room {
        font-size: 14px;
      }
    }
  </style>
</head>

    };

    const parseWeeks = (weeksText) => {
      const weeks = [];

      for (const token of String(weeksText).match(/\d+(?:-\d+)?/g) || []) {
        if (token.includes("-")) {
          const [startText, endText] = token.split("-");
          const start = Number(startText);
          const end = Number(endText);
          for (let week = start; week <= end; week += 1) weeks.push(week);
        } else {
          weeks.push(Number(token));
        }
      }

      return weeks;

      return { ...course, startPeriod, endPeriod, weeks: parseWeeks(course.weeks) };

        room: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M10 24l22-12 22 12"></path><path d="M14 28h36"></path><path d="M18 28v18"></path><path d="M28 28v18"></path><path d="M38 28v18"></path><path d="M48 28v18"></path><path d="M12 50h40"></path></svg>',
        site: '<svg viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="19"></circle><path d="M14 32h36"></path><path d="M32 13c6 6 9 12 9 19s-3 13-9 19"></path><path d="M32 13c-6 6-9 12-9 19s3 13 9 19"></path></svg>',
        refresh: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M45 21a17 17 0 1 0 4 17"></path><path d="M46 11v14H32"></path></svg>',
        library: '<svg viewBox="0 0 64 64" aria-hidden="true"><circle cx="28" cy="28" r="14"></circle><path d="M39 39l11 11"></path><path d="M22 28c0-3 3-6 6-6"></path></svg>',
        borrow: '<svg viewBox="0 0 64 64" aria-hidden="true"><rect x="16" y="10" width="30" height="44" rx="3"></rect><path d="M24 20h14"></path><path d="M24 30h14"></path><path d="M24 40h10"></path></svg>'
      };

      return icons[key] || icons.schedule;
    };

    const renderHeader = () => {
      const title = document.getElementById("homeTitle");
      if (title) title.textContent = weekTitles[currentDayIndex()] + "课表";
    };

    const renderMenu = () => {
      const menu = document.getElementById("menuGrid");
      if (!(menu instanceof HTMLElement)) return;

      menu.innerHTML = menuItems.map((item) => {
        const classes = "menu-item" + (item.enabled ? "" : " disabled");
        const inner =
          '<span class="menu-icon">' + menuIcon(item.key) + "</span>" +
          '<span class="menu-label">' + escapeHtml(item.label) + "</span>";

        return item.key === "schedule"
          ? '<a class="' + classes + '" href="' + timetablePageHref + '">' + inner + "</a>"
          : '<button type="button" class="' + classes + '" data-menu="' + escapeHtml(item.key) + '">' + inner + "</button>";
      }).join("");
    };

    const renderHome = () => {
      const list = upcomingCourses();
      const noticeText = document.getElementById("noticeText");
      const recent = document.getElementById("recentList");

      if (noticeText) {
        noticeText.textContent = list.length > 0
          ? "服务器出错加载数据失败，请稍后下拉刷新，由于安全限定"
          : "暂无近期课程记录，可以点击下方按钮查看完整课表";
      }

      if (!(recent instanceof HTMLElement)) return;

      const items = list.length > 0
        ? list
        : [{
            displayDay: "空",
            courseName: "最近没有待上的课程",
            displayDate: "可以点击下方按钮查看完整课表",
            classroom: "待定",
            startPeriod: null,
            endPeriod: 1
          }];

      recent.innerHTML = items.map((course) => {
        const timeText = typeof course.startPeriod === "number"
          ? "第" + course.startPeriod + "大节 " + (periodSlots[course.startPeriod]?.start || "") + "-" + (periodSlots[course.endPeriod]?.end || "")
          : course.displayDate;

        return (
          '<div class="recent-item">' +
            '<div class="badge">' + escapeHtml(course.displayDay) + "</div>" +
            '<div class="recent-main">' +
              '<div class="recent-title">' + escapeHtml(course.courseName) + "</div>" +
              '<div class="recent-meta">' + escapeHtml(timeText) + "</div>" +
            "</div>" +
            '<div class="recent-room">' + escapeHtml(course.classroom || "待定") + "</div>" +
          "</div>"
        );
      }).join("");
    };

    document.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      if (target.closest("[data-menu]")) {
        showToast("该功能入口已预留，暂未实现");
      }

      if (target.closest("[data-action='menu']")) {
        showToast("更多功能入口已预留，后续可以继续补充");
      }
    });

    renderHeader();
    renderMenu();
    renderHome();
  </script>
</body>
</html>
